name: SwiftAnalytics CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MLX_DEVICE: cpu
  MLX_FORCE_CPU: "1"
  MLX_METAL_DISABLE: "1"
  METAL_DEVICE_WRAPPER_TYPE: cpu
  # "Заховати" фреймворки, щоб MLX не міг їх завантажити
  DYLD_FRAMEWORK_PATH: "/tmp/empty"

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: 'latest' }
      - run: swift build -v

  test:
    name: Unit Tests
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: 'latest' }
      
      - name: Run tests with patched environment
        env:
          # Примусово ігноруємо всі спроби пошуку Metal
          DYLD_FRAMEWORK_PATH: "/tmp/empty"
        run: |
          # Створюємо фіктивну директорію для DYLD, щоб нічого не знайти
          mkdir -p /tmp/empty
          swift test --enable-code-coverage -v --skip SwiftLLMTests
        
      - name: Export coverage
        run: |
          BUILD_DIR=$(swift build --show-bin-path -c debug)
          PROFDATA=".build/debug/codecov/default.profdata"
          TEST_BINS=$(find "$BUILD_DIR" -name "*.xctest" -type d | while read d; do echo "$d/Contents/MacOS/$(basename "${d%.xctest}")"; done | tr '\n' ' ')
          xcrun llvm-cov export -format="lcov" -instr-profile="$PROFDATA" $TEST_BINS > coverage.lcov || true
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  performance-check:
    name: Performance Regression Check
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: 'latest' }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      
      - name: Run Benchmarks
        env:
          DYLD_FRAMEWORK_PATH: "/tmp/empty"
        run: |
          mkdir -p /tmp/empty
          swift build -c release --product SwiftAnalyticsBenchmarks
          swift run -c release SwiftAnalyticsBenchmarks --json benchmarks.json
          python3 Benchmarks/Python/compare.py benchmarks.json --regression-threshold 1.2