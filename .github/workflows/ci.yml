name: SwiftAnalytics CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SWIFT_PACKAGE_DIR: "."
  MACOSX_DEPLOYMENT_TARGET: "14.0"

jobs:
  # 1. Build
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: 'latest' }
      - uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-v2-${{ hashFiles('**/Package.resolved') }}
      - run: swift build -v

  # 2. Test
  test:
    name: Unit Tests (Safe Mode)
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: 'latest' }
      - uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-v2-${{ hashFiles('**/Package.resolved') }}
      
      - name: Run safe unit tests
        run: |
          swift test --enable-code-coverage -v \
            --skip SwiftLLMTests \
            --skip SwiftMLTests \
            --skip SwiftClusterTests \
            --skip SwiftForecastTests \
            --skip SwiftPrivacyTests \
            --skip SwiftExplainTests \
            --skip SwiftNLPTests
        
      - name: Export coverage
        run: |
          BUILD_DIR=$(swift build --show-bin-path -c debug)
          PROFDATA=".build/debug/codecov/default.profdata"
          TEST_BINS=$(find "$BUILD_DIR" -name "*.xctest" -type d | while read d; do echo "$d/Contents/MacOS/$(basename "${d%.xctest}")"; done | tr '\n' ' ')
          xcrun llvm-cov export -format="lcov" -instr-profile="$PROFDATA" $TEST_BINS > coverage.lcov || true
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # 3. Benchmark
  performance-check:
    name: Performance Regression Check (Disabled in CI)
    runs-on: macos-latest
    steps:
      - name: Skip due to GPU requirements
        run: echo "Benchmarks require GPU-enabled runner. Skipping."