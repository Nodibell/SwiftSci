name: SwiftAnalytics CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SWIFT_PACKAGE_DIR: "."
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  MLX_DEVICE: cpu
  MLX_METAL_DISABLE: "1"

jobs:
  # 1. Build
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: 'latest' }
      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
      - run: swift build -v

  # 2. Test
  test:
    name: Unit Tests
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: 'latest' }
      - uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
      - name: Run tests
        run: swift test --enable-code-coverage -v --skip SwiftLLMTests
      - name: Upload coverage
        run: |
          BUILD_DIR=$(swift build --show-bin-path -c debug)
          PROFDATA=".build/debug/codecov/default.profdata"
          TEST_BINS=$(find "$BUILD_DIR" -name "*.xctest" -type d | while read d; do echo "$d/Contents/MacOS/$(basename "${d%.xctest}")"; done | tr '\n' ' ')
          xcrun llvm-cov export -format="lcov" -instr-profile="$PROFDATA" $TEST_BINS > coverage.lcov || true
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}

  # 3. Benchmark
  performance-check:
    name: Performance Regression Check
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with: { xcode-version: 'latest' }
      - uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip", cache-dependency-path: Benchmarks/Python/requirements.txt }
      - name: Install dependencies
        run: pip install -r Benchmarks/Python/requirements.txt
      - name: Run Benchmarks
        run: |
          swift build -c release --product SwiftAnalyticsBenchmarks
          mkdir -p Benchmarks/Results
          swift run -c release SwiftAnalyticsBenchmarks --json Benchmarks/Results/swift_results.json
          python3 Benchmarks/Python/benchmarks.py --json Benchmarks/Results/python_results.json
          python3 Benchmarks/Python/compare.py Benchmarks/Results/swift_results.json Benchmarks/Results/python_results.json --regression-threshold 1.2
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: Benchmarks/Results/